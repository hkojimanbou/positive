<!DOCTYPE html>
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DJコジコジ（POSITIVE）</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #FFF5E4, #FF8C00);
      background-attachment: fixed;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      margin: 0;
    }
    .sunburst {
      position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: repeating-conic-gradient(from 0deg,
        rgba(255,140,0,0.1) 0deg 15deg,
        rgba(255,245,228,0.1) 15deg 30deg);
      animation: rotate 60s linear infinite; z-index: -2;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    .floating-word {
      position: fixed; bottom: -50px; font-weight: 900;
      color: rgba(255,140,0,0.5);
      animation: floatUp 4s linear forwards;
      z-index: -1; pointer-events: none; white-space: nowrap;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }
    .popup-vibe {
      position: fixed; font-weight: 900; font-size: 2.2rem;
      pointer-events: none; z-index: 100;
      text-shadow: 2px 2px 0 #FFF,-2px -2px 0 #FFF,2px -2px 0 #FFF,-2px 2px 0 #FFF;
      transition: none;
    }
    .clap-emoji {
      font-size: 3rem;
      animation: clapAnim 0.4s ease-in-out infinite alternate;
    }
    @keyframes clapAnim {
      0%    { transform: scale(1) rotate(-15deg); }
      100% { transform: scale(1.4) rotate(15deg); }
    }
    #more-shower-btn {
      background: linear-gradient(180deg, #FFF0A0 0%, #FFE044 20%, #FFD23F 55%, #FFA800 100%);
      box-shadow: 0 8px 0 #9A6200, 0 10px 20px rgba(0,0,0,0.3),
        inset 0 2px 0 rgba(255,255,255,0.7);
      border: 2px solid #CC8800;
      transition: all 0.1s ease;
    }
    #more-shower-btn:active {
      box-shadow: 0 2px 0 #9A6200, 0 3px 8px rgba(0,0,0,0.2);
      transform: translateY(6px);
    }
    .spotify-btn {
      background: linear-gradient(180deg, #3AE865 0%, #1DB954 50%, #17963F 100%);
      box-shadow: 0 5px 0 #0D6B2D, 0 6px 10px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.3);
      border: none; border-radius: 4px;
      color: white; font-weight: 900; font-size: 0.7rem;
      padding: 9px 10px; cursor: pointer;
      transition: all 0.1s ease;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    .spotify-btn:active { box-shadow: 0 1px 0 #0D6B2D; transform: translateY(4px); }
    #shower-text { white-space: pre-line; line-height: 1.7; }
  </style>
  <style>
    /* Tailwind CSSのスタイルはそのまま保持します */
    *, ::before, ::after{--tw-border-spacing-x:0;--tw-border-spacing-y:0;--tw-translate-x:0;--tw-translate-y:0;--tw-rotate:0;--tw-skew-x:0;--tw-skew-y:0;--tw-scale-x:1;--tw-scale-y:1;--tw-pan-x: ;--tw-pan-y: ;--tw-pinch-zoom: ;--tw-scroll-snap-strictness:proximity;--tw-gradient-from-position: ;--tw-gradient-via-position: ;--tw-gradient-to-position: ;--tw-ordinal: ;--tw-slashed-zero: ;--tw-numeric-figure: ;--tw-numeric-spacing: ;--tw-numeric-fraction: ;--tw-ring-inset: ;--tw-ring-offset-width:0px;--tw-ring-offset-color:#fff;--tw-ring-color:rgb(59 130 246 / 0.5);--tw-ring-offset-shadow:0 0 #0000;--tw-ring-shadow:0 0 #0000;--tw-shadow:0 0 #0000;--tw-shadow-colored:0 0 #0000;--tw-blur: ;--tw-brightness: ;--tw-contrast: ;--tw-grayscale: ;--tw-hue-rotate: ;--tw-invert: ;--tw-saturate: ;--tw-sepia: ;--tw-drop-shadow: ;--tw-backdrop-blur: ;--tw-backdrop-brightness: ;--tw-backdrop-contrast: ;--tw-backdrop-grayscale: ;--tw-backdrop-hue-rotate: ;--tw-backdrop-invert: ;--tw-backdrop-opacity: ;--tw-backdrop-saturate: ;--tw-backdrop-sepia: ;--tw-contain-size: ;--tw-contain-layout: ;--tw-contain-paint: ;--tw-contain-style: }
    /* ... (中略) ... */
    .shadow-xl{--tw-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);--tw-shadow-colored:0 20px 25px -5px var(--tw-shadow-color), 0 8px 10px -6px var(--tw-shadow-color);box-shadow:var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)}
  </style>
</head>
<body class="flex flex-col h-screen relative">
  <div class="sunburst"></div>

  <main class="flex-1 px-3 pb-4 z-10 flex flex-col items-center w-full pt-6">
    <div class="bg-white/80 rounded-[20px] border-2 border-[#FFD23F] p-5 w-full max-w-[300px] shadow-xl flex flex-col items-center relative" style="min-height:320px;">
      <div class="text-orange-500 font-bold text-xs mb-3 border border-orange-500 rounded-full px-3 py-1">TODAY'S POSITIVE SHOWER</div>

      <div id="welcome-area" class="flex items-center justify-center w-full" style="min-height:160px;">
        <p id="welcome-text" class="text-3xl font-black text-orange-400 tracking-widest">WELCOME</p>
      </div>

      <div id="intro-area" class="hidden w-full" style="min-height:160px;">
        <ul class="w-full font-black text-gray-800 space-y-2" style="font-size:clamp(13px,4vw,17px)">
          <li><i class="fa-solid fa-circle text-orange-400 text-[9px] mr-2"></i><span id="intro-1"></span></li>
          <li><i class="fa-solid fa-circle text-orange-400 text-[9px] mr-2"></i><span id="intro-2"></span></li>
          <li><i class="fa-solid fa-circle text-orange-400 text-[9px] mr-2"></i><span id="intro-3"></span></li>
        </ul>
      </div>

      <div id="shower-area" class="hidden w-full flex flex-col items-center justify-center" style="min-height:160px;">
        <p id="shower-text" class="text-2xl font-black text-center text-gray-800 w-full"></p>
        <div id="clap-area" class="hidden flex items-center justify-center gap-6 w-full">
          <span class="clap-emoji" style="animation-delay:0s">👏</span>
          <span class="clap-emoji" style="animation-delay:0.13s">👏</span>
          <span class="clap-emoji" style="animation-delay:0.26s">👏</span>
        </div>
      </div>

      <button id="more-shower-btn" class="text-orange-800 font-black py-4 px-6 rounded-full w-full text-lg mt-0">
        <span id="btn-label">Push Here！</span>
      </button>
    </div>

    <div class="w-full max-w-[300px] mt-4 mb-2">
      <p class="text-center text-orange-800 font-black text-sm mb-2">🎵 好きな音楽を選ぶ</p>
      <div class="flex flex-wrap gap-2 justify-center">
        <button class="spotify-btn" onclick="openSpotify('https://open.spotify.com/')">ケツメイシMIX</button>
        <button class="spotify-btn" onclick="openSpotify('https://open.spotify.com/')">RaggaeMix</button>
        <button class="spotify-btn" onclick="openSpotify('https://open.spotify.com/')">サザン＆桑田</button>
        <button class="spotify-btn" onclick="openSpotify('https://open.spotify.com/')">80sParty</button>
        <button class="spotify-btn" onclick="openSpotify('https://open.spotify.com/')">ナイアガラ</button>
      </div>
    </div>
  </main>

  <script>
    // ===== データ (博志さんのオリジナルデータです) =====
    const bgWords = ["最高！","天才！","神！","YES!","完璧！","最強！","優勝！","伝説！","無敵！","鬼才！","覇者！","奇跡！","本物！","尊い！","無双！","BOOM!","最高峰！","宇宙一！"];
    const popupColors = ['#FF4500','#FFD700','#00CC44','#1E90FF','#FF1493'];
    const tapPopups = ["天才！","最高！","伝説！","最強！","ブラボー！","完璧！","神業！","無敵！","優勝！","YES!!","BOOM!"];
    const introTexts = ["なんでも100％肯定！","存在に感謝、ありがとー！","さあ、準備はいいかい？"];

    function fmt(s) {
      let result = s.replace(/([！、])/g, '$1\n');
      result = result.replace(/！\n([^！\n])/g, (m, next) => '！\n' + next);
      const lines = result.split('\n');
      const cleaned = [];
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].trim() === '！' && cleaned.length > 0) {
          cleaned[cleaned.length - 1] += '！';
        } else if (lines[i].trim() !== '') {
          cleaned.push(lines[i]);
        }
      }
      return cleaned.join('\n');
    }

    const rawShowers = [
      "そこにいるだけで100点満点！！光が溢れてる！",
      "存在そのものが、伝説のスタートだぜ！！",
      "今日という日は、最高の日だ！！",
      "その悩み？もはや芸術（アート）だ！進化の証拠！",
      "生きているだけで\n世界の正解率が上がってるんだぜ！",
      "今日は昨日より確実に進化してる！証明完了！",
      "全部うまくいく！だって今日この瞬間があるから！",
      "可能性は無限大！計算不能！オーバーフロー確定！",
      "いい風が吹いてるなぁ、今日この瞬間！",
      "失敗も全部財産だ！今日もやりきった！",
      "生きてる奇跡を、全力で受け取ってくれ！",
      "笑顔ひとつで、世界が変わるんだぜ！",
      "迷ってるその姿が、一番かっこいいんだ！",
      "どんな一日も、今日という日は二度とない！",
      "前を向いてるだけで、周りが明るくなってるんだ！",
      "その一歩が、歴史を変えるんだ！踏み出せ！",
      "今この瞬間も、細胞が全力で支えてくれてる！",
      "全部うまくいく！今この瞬間の積み重ねが証明する！",
      "発した言葉が、今宇宙を旅してるんだぜ！最高！",
      "どんな状況でも、正しい道を歩いてる！信じろ！",
      "今日という日は、奇跡の連続だ！",
      "笑える瞬間を、全力で楽しんでくれ！",
      "今いるここが、最高の場所だ！",
      "その言葉の重さ、受け取ったぜ！本物だ！",
      "今日も素敵な一日だ！全力で感じてくれ！",
      "どんな自分も、最高の自分だ！",
      "今日のこの瞬間が、宝物になるんだぜ！",
      "休むことも才能だ！全力で休んでくれ！",
      "泣いていい！その涙も全部、輝いてる！",
      "焦らなくていい！自分のペースが最強だ！"
    ];

    const rawPhrases = ["神！","優勝！","天才！","ブラボー！","圧倒的！","それな！","最高すぎる！","伝説！","無敵！","鬼才！","覇者！","完璧！","全肯定！","輝いてる！","本物！","大正解！","ヤバい！","エグい！","神展開！","大勝利！","奇跡！","絶対的！","大天才！","超最高！","素晴らしい！","アメージング！","エクセレント！","最高峰！","極上！","至高！","規格外！","宇宙一！","ミラクル！","感動的！","尊い！","唯一無二！","光ってる！","無双！","超絶！","トップ！","生きてるだけで丸儲け","存在そのものがギフト","そのままで100点","今日もやりきった！","愛されている！","失敗も全部財産だ","休むことも才能だよ","自分を信じていい","焦らなくて大丈夫","ありのままが一番","無理しなくていいよ","そのままでいい","いつでも味方だぜ","よく頑張ってるね","すべてうまくいく","そのまま進もう","自分のペースでいい","泣いても大丈夫","笑っていこう","今日も素敵だよ","可能性は無限大","未来は明るい","今を生きよう","すべてが順調","自分を褒めよう","存在自体が奇跡","すべて受け止めるよ","失敗しても大丈夫","マイペースが一番","自分を大切に","一人じゃないぞ","いつだって味方","すべてはプロセス","ありふれた日々が宝物","自分を信じよう","いい風が吹いてるなぁ","そのままでいいんだなぁ","今日もいい日だなぁ","なんて素敵な日なんだなぁ","いるだけでよかったなぁ","転んだっていい また立てばいい","そのままでいい そのままがいい","今日が 一番いい","そのままで じゅうぶんだよ","無理はしなくて いいんだよ","泣きたい時は 泣けばいい","自分の道は 自分のもの","ゆっくりでいい 焦らずに","比べなくていい 自分は自分","不器用でも まっすぐに","生きている だけで素晴らしい","笑える日が きっと来る","心のままに 歩めばいい","自分の花を 咲かせよう","休むことも 大切な仕事","自分らしさが 一番の魅力","完璧じゃなくて いいんだよ","そのままで 素晴らしい","小さな一歩で いいんだよ","大丈夫 きっとうまくいく"];

    // ===== ロジック (博志さんのオリジナルのままです) =====
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    function playTapSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    }
    function openSpotify(url) {
      playTapSound();
      if (navigator.vibrate) navigator.vibrate(20);
      window.open(url, '_blank');
    }

    function spawnBgWord() {
      const el = document.createElement('div');
      el.className = 'floating-word';
      el.textContent = bgWords[Math.floor(Math.random() * bgWords.length)];
      el.style.left = Math.random() * 80 + 10 + 'vw';
      el.style.fontSize = (Math.random() * 2 + 1) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
    setInterval(spawnBgWord, 200);

    function spawnPopup(text, x, y) {
      const el = document.createElement('div');
      el.className = 'popup-vibe';
      el.textContent = text;
      el.style.position = 'fixed';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.color = popupColors[Math.floor(Math.random() * popupColors.length)];
      const rot = (Math.random()*30-15);
      document.body.appendChild(el);
      const start = performance.now();
      const dur = 800;
      function animate(now) {
        const t = Math.min((now - start) / dur, 1);
        const scale = 0.5 + t * 1.1;
        const dy = -t * 70;
        el.style.transform = 'translate(-50%,-50%) translateY(' + dy + 'px) scale(' + scale + ') rotate(' + rot + 'deg)';
        el.style.opacity = t < 0.2 ? (t/0.2) : (1 - (t-0.2)/0.8);
        if (t < 1) requestAnimationFrame(animate);
        else el.remove();
      }
      requestAnimationFrame(animate);
    }

    function typeText(el, text, speed, cb) {
      let i = 0;
      const iv = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) { clearInterval(iv); if (cb) setTimeout(cb, 300); }
      }, speed);
    }

    let phase = 'welcome';
    let typeIv = null;
    let lastClickTime = 0;
    let rapidCount = 0;
    let isRapid = false;
    let usedShowers = [];

    function getShower() {
      if (usedShowers.length >= rawShowers.length) usedShowers = [];
      const remaining = rawShowers.filter(s => !usedShowers.includes(s));
      const s = remaining[Math.floor(Math.random() * remaining.length)];
      usedShowers.push(s);
      return s.includes('\n') ? s : fmt(s);
    }

    setTimeout(() => {
      const wt = document.getElementById('welcome-text');
      wt.textContent = '';
      typeText(wt, 'WELCOME', 120, null);
    }, 300);

    function showShower() {
      if (phase === 'welcome') {
        document.getElementById('welcome-area').classList.add('hidden');
        document.getElementById('intro-area').classList.remove('hidden');
        phase = 'intro';
        document.getElementById('btn-label').innerHTML = 'もっとシャワー浴びる！<br><span style="font-size:0.85rem;font-weight:700;letter-spacing:0.05em">Push！ Push！</span>';
        typeText(document.getElementById('intro-1'), introTexts, 60, () =>
          typeText(document.getElementById('intro-2'), introTexts, 60, () =>
            typeText(document.getElementById('intro-3'), introTexts, 60, null)
          )
        );
        return;
      }
      if (phase === 'intro') {
        document.getElementById('intro-area').classList.add('hidden');
        document.getElementById('shower-area').classList.remove('hidden');
        phase = 'shower';
      }
      document.getElementById('clap-area').classList.add('hidden');
      const el = document.getElementById('shower-text');
      el.classList.remove('hidden');
      el.textContent = '';
      if (typeIv) clearInterval(typeIv);
      const text = getShower();
      let i = 0;
      typeIv = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) clearInterval(typeIv);
      }, 45);
    }

    document.getElementById('more-shower-btn').addEventListener('click', () => {
      playTapSound();
      if (navigator.vibrate) navigator.vibrate(20);
      spawnPopup('YES!!', window.innerWidth / 2, window.innerHeight / 3);
      showShower();
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('#more-shower-btn') || e.target.closest('.spotify-btn')) return;
      spawnPopup(tapPopups[Math.floor(Math.random() * tapPopups.length)], e.clientX, e.clientY);
    });
  </script>
</body></html>
