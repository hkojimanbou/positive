<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DJコジコジ（POSITIVE）</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #FFF5E4, #FF8C00);
      background-attachment: fixed;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      margin: 0;
    }
    .sunburst {
      position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.1) 0deg 15deg, transparent 15deg 30deg);
      animation: rotateSun 60s linear infinite;
      z-index: -1; pointer-events: none;
    }
    @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .container {
      max-width: 600px; margin: 0 auto; padding: 20px;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    h1 {
      font-weight: 900; color: #D35400; text-shadow: 2px 2px 0 #fff;
      margin: 20px 0; font-size: 2.2rem; text-align: center;
    }
    .main-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 30px; padding: 30px; width: 100%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      border: 5px solid #FFD39B; text-align: center; margin-bottom: 30px;
    }
    .vibe-display { font-size: 1.2rem; color: #E67E22; margin-bottom: 10px; font-weight: 700; }
    .status-text { font-size: 2.5rem; color: #D35400; font-weight: 900; margin-bottom: 20px; line-height: 1.2; }
    .vibe-button {
      background: #FF8C00; color: white; border: none;
      padding: 18px 40px; font-size: 1.5rem; font-weight: 900;
      border-radius: 50px; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 0 #CC7000; margin-bottom: 20px;
      width: 100%; max-width: 300px;
    }
    .vibe-button:active { transform: translateY(4px); box-shadow: 0 4px 0 #CC7000; }
    .stats-container { display: flex; gap: 15px; width: 100%; margin-top: 20px; }
    .stat-box {
      flex: 1; background: #FFF; border-radius: 20px; padding: 15px;
      border: 3px solid #FFD39B;
    }
    .stat-label { font-size: 0.8rem; color: #E67E22; margin-bottom: 5px; }
    .stat-value { font-size: 1.5rem; font-weight: 900; color: #D35400; }
    .floating-word {
      position: fixed; color: #FF4500;
      font-weight: 900; pointer-events: none; white-space: nowrap;
      animation: floatUp 3s ease-out forwards; z-index: 100;
      text-shadow: 1px 1px 0 #fff;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
      100% { transform: translateY(-250px) scale(1); opacity: 0; }
    }
    footer { margin-top: auto; padding: 20px; color: #D35400; font-weight: 700; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="sunburst"></div>
  <div class="container">
    <h1>DJコジコジ POSITIVE</h1>
    <div class="main-card">
      <div class="vibe-display"><i class="fas fa-bolt"></i> VIBES STATUS</div>
      <div id="status" class="status-text">絶好調！</div>
      <button class="vibe-button" onclick="boostVibe()">
        <i class="fas fa-heartbeat"></i> 波動を上げる
      </button>
      <div class="stats-container">
        <div class="stat-box">
          <div class="stat-label">累積ポジティブ</div>
          <div id="count" class="stat-value">0</div>
        </div>
        <div id="level-box" class="stat-box">
          <div class="stat-label">現在の階級</div>
          <div id="level" class="stat-value">幸運児</div>
        </div>
      </div>
    </div>
    <footer>© 2026 POSITIVE VIBES PROJECT</footer>
  </div>

  <script>
    let score = 0;
    const words = ["最高！", "無敵！", "優勝！", "天才！", "鬼才！", "覇者！", "尊い！", "YES!", "最高峰！", "神！", "感謝！", "おめでとう！"];
    const statuses = [
      { threshold: 0, text: "絶好調！", color: "#D35400" },
      { threshold: 10, text: "輝いてる！", color: "#FF4500" },
      { threshold: 30, text: "銀河一！", color: "#FF00FF" },
      { threshold: 50, text: "存在が奇跡！", color: "#FF1493" },
      { threshold: 100, text: "宇宙の創造主！", color: "#8A2BE2" }
    ];

    function boostVibe() {
      score++;
      document.getElementById('count').innerText = score;
      
      const word = words[Math.floor(Math.random() * words.length)];
      createFloatingWord(word);
      updateStatus();
    }

    function createFloatingWord(text) {
      const div = document.createElement('div');
      div.className = 'floating-word';
      div.innerText = text;
      div.style.left = (Math.random() * 80 + 10) + 'vw';
      div.style.top = (Math.random() * 20 + 40) + 'vh';
      div.style.fontSize = (Math.random() * 1.5 + 1.2) + 'rem';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }

    function updateStatus() {
      const statusEl = document.getElementById('status');
      const levelEl = document.getElementById('level');
      
      let currentStatus = statuses;
      for (let s of statuses) {
        if (score >= s.threshold) currentStatus = s;
      }
      
      statusEl.innerText = currentStatus.text;
      statusEl.style.color = currentStatus.color;
      
      if (score >= 100) levelEl.innerText = "神";
      else if (score >= 50) levelEl.innerText = "聖人";
      else if (score >= 30) levelEl.innerText = "豪傑";
      else if (score >= 10) levelEl.innerText = "達人";
    }
  </script>
</body>
</html>
