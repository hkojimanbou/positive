    function fmt(s) {
      // 「！」「、」の後に改行を入れる
      let result = s.replace(/([！、])/g, '$1\n');
      // 行が「！」だけになるケースを防ぐ：前の行末の「！」と次行をくっつける
      result = result.replace(/！\n([^！\n])/g, (m, next) => '！\n' + next);
      // 「！」単独行を除去（前行に結合）
      const lines = result.split('\n');
      const cleaned = [];
      for (let i = 0; i < lines.length; i++) {

          cleaned[cleaned.length - 1] += '！';

          cleaned.push(lines[i]);
        }
      }

    // ===== Audio =====
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    function playTapSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    }
    function openSpotify(url) {
      playTapSound();
      if (navigator.vibrate) navigator.vibrate(20);
      window.open(url, '_blank');
    }

    // ===== バック文字（フェーズ4.5と同じ間隔・色） =====
    function spawnBgWord() {
      const el = document.createElement('div');
      el.className = 'floating-word';
      el.textContent = bgWords[Math.floor(Math.random() * bgWords.length)];
      el.style.left = Math.random() * 80 + 10 + 'vw';
      el.style.fontSize = (Math.random() * 2 + 1) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
    // 起動直後から絶えず流す（フェーズ4.5と同じ200ms間隔）
    for (let i = 0; i < 5; i++) setTimeout(spawnBgWord, i * 80);
    setInterval(spawnBgWord, 200);

    // ===== ポップアップ =====
    function spawnPopup(text, x, y) {
      const el = document.createElement('div');
      el.className = 'popup-vibe';
      el.textContent = text;
      el.style.position = 'fixed';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.color = popupColors[Math.floor(Math.random() * popupColors.length)];
      const rot = (Math.random()*30-15);
      document.body.appendChild(el);
      const start = performance.now();
      const dur = 800;
      function animate(now) {
        const t = Math.min((now - start) / dur, 1);
        const scale = 0.5 + t * 1.1;
        const dy = -t * 70;
        el.style.transform = 'translate(-50%,-50%) translateY(' + dy + 'px) scale(' + scale + ') rotate(' + rot + 'deg)';
        el.style.opacity = t < 0.2 ? (t/0.2) : (1 - (t-0.2)/0.8);
        if (t < 1) requestAnimationFrame(animate);
        else el.remove();
      }
      requestAnimationFrame(animate);
    }

    // ===== タイピング =====
    function typeText(el, text, speed, cb) {
      let i = 0;
      const iv = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) { clearInterval(iv); if (cb) setTimeout(cb, 300); }
      }, speed);
    }

    // ===== 状態 =====
    let phase = 'welcome';
    let typeIv = null;
    let lastClickTime = 0;
    let rapidCount = 0;
    let isRapid = false;
    let rapidEndTimer = null;
    let usedShowers = [];

    function getShower() {
      if (usedShowers.length >= rawShowers.length) usedShowers = [];
      const remaining = rawShowers.filter(s => !usedShowers.includes(s));
      const s = remaining[Math.floor(Math.random() * remaining.length)];
      usedShowers.push(s);
      // 改行済みのものはそのまま、それ以外はfmt適用
      return s.includes('\n') ? s : fmt(s);
    }

    // ===== 起動シーケンス =====
    // WELCOME表示（二重防止のためフラグ管理）
    let welcomeStarted = false;
    setTimeout(() => {
      if (welcomeStarted) return;
      welcomeStarted = true;
      const wt = document.getElementById('welcome-text');
      wt.textContent = '';
      typeText(wt, 'WELCOME', 120, null);
    }, 300);

    // ===== シャワー表示 =====
    function showShower() {
      if (phase === 'welcome') {
        // 初回ボタン押下：WELCOMEを消して3行intro表示
        document.getElementById('welcome-area').classList.add('hidden');
        document.getElementById('intro-area').classList.remove('hidden');
        phase = 'intro';
        // ボタン名を変更
        document.getElementById('btn-label').innerHTML = 'もっとシャワー浴びる！<br><span style="font-size:0.85rem;font-weight:700;letter-spacing:0.05em">Push！ Push！</span>';
        // 3行タイピング
        typeText(document.getElementById('intro-1'), introTexts[0], 60, () =>
          typeText(document.getElementById('intro-2'), introTexts[1], 60, () =>
            typeText(document.getElementById('intro-3'), introTexts[2], 60, null)
          )
        );
        return;
      }
      if (phase === 'intro') {
        document.getElementById('intro-area').classList.add('hidden');
        document.getElementById('shower-area').classList.remove('hidden');
        phase = 'shower';
      }
      document.getElementById('clap-area').classList.add('hidden');
      const el = document.getElementById('shower-text');
      el.classList.remove('hidden');
      el.textContent = '';
      if (typeIv) clearInterval(typeIv);
      const text = getShower();
      let i = 0;
      typeIv = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) clearInterval(typeIv);
      }, 45);
    }

    // ===== 連打ロジック =====
    function handleRapid() {
      if (!isRapid) {
        isRapid = true;
        if (typeIv) clearInterval(typeIv);
        document.getElementById('shower-text').classList.add('hidden');
        document.getElementById('clap-area').classList.remove('hidden');
        if (phase === 'intro') {
          document.getElementById('intro-area').classList.add('hidden');
          document.getElementById('shower-area').classList.remove('hidden');
          phase = 'shower';
        }
      }
      clearTimeout(rapidEndTimer);
      rapidEndTimer = setTimeout(() => { // 0.3秒
        isRapid = false;
        rapidCount = 0;
        showShower();
      }, 300);
    }

    // ===== ボタンクリック =====
    document.getElementById('more-shower-btn').addEventListener('click', () => {
      playTapSound();
      if (navigator.vibrate) navigator.vibrate(20);

      // YES!! 3か所から発生
      spawnPopup('YES!!', window.innerWidth / 2, window.innerHeight / 3);
      setTimeout(() => spawnPopup('YES!!', window.innerWidth * 0.25, window.innerHeight / 2), 150);
      setTimeout(() => spawnPopup('YES!!', window.innerWidth * 0.75, window.innerHeight / 2.5), 300);

      const now = Date.now();
      if (now - lastClickTime < 1000) {
        rapidCount++;
      } else {
        rapidCount = 1;
      }
      lastClickTime = now;

      if (rapidCount >= 2) {
        handleRapid();
      } else {
        if (!isRapid) showShower();
      }
    });

    // ===== 画面タップ（ボタン以外）=====
    document.addEventListener('click', (e) => {
      if (e.target.closest('#more-shower-btn') || e.target.closest('.spotify-btn')) return;
      // カード内クリックも含めて全体で反応する
      // ポップアップ
      spawnPopup(tapPopups[Math.floor(Math.random() * tapPopups.length)], e.clientX, e.clientY);
      // フレーズをバック文字として流す（タップ時のみ追加）
      const el = document.createElement('div');
      el.className = 'floating-word';
      el.textContent = rawPhrases[Math.floor(Math.random() * rawPhrases.length)];
      el.style.left = Math.random() * 70 + 15 + 'vw';
      el.style.fontSize = '1.1rem';
      el.style.color = 'rgba(200,80,0,0.65)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
      if (navigator.vibrate) navigator.vibrate(20);
    });
  </script>
