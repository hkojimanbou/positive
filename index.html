  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DJコジコジ（POSITIVE）</title>
  <script src="./ご機嫌さん‗フェーズ5.5_files/saved_resource"></script>
  <link rel="stylesheet" href="./ご機嫌さん‗フェーズ5.5_files/all.min.css">
  <link href="./ご機嫌さん‗フェーズ5.5_files/css2" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #FFF5E4, #FF8C00);
      background-attachment: fixed;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      margin: 0;
    }
    .sunburst {
      position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: repeating-conic-gradient(from 0deg,
        rgba(255,140,0,0.1) 0deg 15deg,
        rgba(255,245,228,0.1) 15deg 30deg);
      animation: rotate 60s linear infinite; z-index: -2;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    .floating-word {
      position: fixed; bottom: -50px; font-weight: 900;
      color: rgba(255,140,0,0.5);
      animation: floatUp 4s linear forwards;
      z-index: -1; pointer-events: none; white-space: nowrap;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }
    .popup-vibe {
      position: fixed; font-weight: 900; font-size: 2.2rem;
      pointer-events: none; z-index: 100;
      text-shadow: 2px 2px 0 #FFF,-2px -2px 0 #FFF,2px -2px 0 #FFF,-2px 2px 0 #FFF;
      transition: none;
    }
    .clap-emoji {
      font-size: 3rem;
      animation: clapAnim 0.4s ease-in-out infinite alternate;
    }
    @keyframes clapAnim {
      0%   { transform: scale(1) rotate(-15deg); }
      100% { transform: scale(1.4) rotate(15deg); }
    }
    #more-shower-btn {
      background: linear-gradient(180deg, #FFF0A0 0%, #FFE044 20%, #FFD23F 55%, #FFA800 100%);
      box-shadow: 0 8px 0 #9A6200, 0 10px 20px rgba(0,0,0,0.3),
        inset 0 2px 0 rgba(255,255,255,0.7);
      border: 2px solid #CC8800;
      transition: all 0.1s ease;
    }
    #more-shower-btn:active {
      box-shadow: 0 2px 0 #9A6200, 0 3px 8px rgba(0,0,0,0.2);
      transform: translateY(6px);
    }
    .spotify-btn {
      background: linear-gradient(180deg, #3AE865 0%, #1DB954 50%, #17963F 100%);
      box-shadow: 0 5px 0 #0D6B2D, 0 6px 10px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.3);
      border: none; border-radius: 4px;
      color: white; font-weight: 900; font-size: 0.7rem;
      padding: 9px 10px; cursor: pointer;
      transition: all 0.1s ease;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    .spotify-btn:active { box-shadow: 0 1px 0 #0D6B2D; transform: translateY(4px); }
    #shower-text { white-space: pre-line; line-height: 1.7; }
  </style>

<body class="flex flex-col h-screen relative">
  <div class="sunburst"></div>

  <main class="flex-1 px-3 pb-4 z-10 flex flex-col items-center w-full pt-6">
    <div class="bg-white/80 rounded-[20px] border-2 border-[#FFD23F] p-5 w-full max-w-[340px] shadow-xl flex flex-col items-center relative" style="min-height:320px;">
      <div class="text-orange-500 font-bold text-xs mb-3 border border-orange-500 rounded-full px-3 py-1">TODAY'S POSITIVE SHOWER</div>

      <!-- WELCOME -->
      <div id="welcome-area" class="flex items-center justify-center w-full hidden" style="min-height:160px;">
        <p id="welcome-text" class="text-3xl font-black text-orange-400 tracking-widest">WELCOME</p>
      </div>

      <!-- 3文言 -->
      <div id="intro-area" class="w-full hidden" style="min-height:160px;">
        <ul class="w-full font-black text-gray-800 space-y-2" style="font-size:clamp(13px,4vw,17px)">
          <li><i class="fa-solid fa-circle text-orange-400 text-[9px] mr-2"></i><span id="intro-1">なんでも100％肯定！</span></li>
          <li><i class="fa-solid fa-circle text-orange-400 text-[9px] mr-2"></i><span id="intro-2">存在に感謝、ありがとー！</span></li>
          <li><i class="fa-solid fa-circle text-orange-400 text-[9px] mr-2"></i><span id="intro-3">さあ、準備はいいかい？</span></li>
        </ul>
      </div>

      <!-- シャワーテキスト -->
      <div id="shower-area" class="w-full flex flex-col items-center justify-center" style="min-height:160px;">
        <p id="shower-text" class="text-2xl font-black text-center text-gray-800 w-full">生きているだけで
世界の正解率が
上がってるんだぜ！</p>
        <div id="clap-area" class="flex items-center justify-center gap-6 w-full hidden">
          <span class="clap-emoji" style="animation-delay:0s">👏</span>
          <span class="clap-emoji" style="animation-delay:0.13s">👏</span>
          <span class="clap-emoji" style="animation-delay:0.26s">👏</span>
        </div>
      </div>

      <!-- ボタン -->
      <div class="flex flex-col gap-1 w-full mt-0">
        <button id="more-shower-btn" class="text-orange-800 font-black px-3 rounded-full w-full text-base" style="height:54px;background:linear-gradient(180deg,#FFF0A0 0%,#FFE044 20%,#FFD23F 55%,#FFA800 100%);box-shadow:0 6px 0 #9A6200,0 8px 16px rgba(0,0,0,0.3),inset 0 2px 0 rgba(255,255,255,0.7);border:2px solid #CC8800;transition:all 0.1s ease;">

    // ===== Audio =====
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    function playTapSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    }
    function openSpotify(url) {
      playTapSound();
      if (navigator.vibrate) navigator.vibrate(20);
      window.open(url, '_blank');
    }
